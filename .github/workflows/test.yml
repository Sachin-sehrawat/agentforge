name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: agentforge_test
          POSTGRES_DB: agentforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admintest
          MONGO_INITDB_DATABASE: agentforge_test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\" --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Apply PostgreSQL schema
        working-directory: backend
        run: |
          PGPASSWORD=agentforge_test psql \
            -h localhost -U agentforge -d agentforge_test \
            -f db/init/01_schema.sql
          PGPASSWORD=agentforge_test psql \
            -h localhost -U agentforge -d agentforge_test \
            -f db/init/02_performance_indexes.sql
        env:
          PGPASSWORD: agentforge_test

      - name: Validate schema applied
        run: |
          TABLE_COUNT=$(PGPASSWORD=agentforge_test psql \
            -h localhost -U agentforge -d agentforge_test -t \
            -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public';")
          echo "Tables created: $TABLE_COUNT"
          if [ "$TABLE_COUNT" -lt 2 ]; then
            echo "Schema validation failed — expected at least 2 tables"
            exit 1
          fi
        env:
          PGPASSWORD: agentforge_test

      - name: Run backend tests with coverage
        working-directory: backend
        run: npm run test:coverage
        env:
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: agentforge_test
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: agentforge_test
          MONGO_URI: mongodb://admin:admintest@localhost:27017/agentforge_test?authSource=admin

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  lint-check:
    name: Lint & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  coverage-report:
    name: Coverage Summary
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend-coverage/
        continue-on-error: true

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend-coverage/
        continue-on-error: true

      - name: Post coverage summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## Test Coverage Report\n\n';

            const summarize = (dir, label) => {
              try {
                fs.readdirSync(dir);
                comment += `### ${label}\n`;
                comment += `Coverage artifacts uploaded — check the \`${label.toLowerCase().replace(' ', '-')}\` artifact for the full HTML report.\n\n`;
              } catch {
                comment += `### ${label}\nCoverage data not available.\n\n`;
              }
            };

            summarize('backend-coverage', 'Backend');
            summarize('frontend-coverage', 'Frontend');

            comment += '_Target: 90% line, function, statement coverage; 85% branch coverage_';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
