name: CI/CD Pipeline

# Triggers on pushes to main (production deploys) and on version tags.
# PRs only run the test suite — see test.yml.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      skip_backup:
        description: 'Skip pre-deployment backup (not recommended)'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/agentforge-backend

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Test with real databases
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test (PostgreSQL + MongoDB)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: agentforge_ci
          POSTGRES_DB: agentforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admintest
          MONGO_INITDB_DATABASE: agentforge_test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\" --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Apply schema
        working-directory: backend
        env:
          PGPASSWORD: agentforge_ci
        run: |
          psql -h localhost -U agentforge -d agentforge_test -f db/init/01_schema.sql
          psql -h localhost -U agentforge -d agentforge_test -f db/init/02_performance_indexes.sql

      - name: Run tests with coverage
        working-directory: backend
        env:
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: agentforge_test
          POSTGRES_USER: agentforge
          POSTGRES_PASSWORD: agentforge_ci
          MONGO_URI: mongodb://admin:admintest@localhost:27017/agentforge_test?authSource=admin
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Docker image build + push
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    needs: [test]
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.run_started_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Output image reference
        run: |
          echo "### Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Pre-deployment backup (staging)
  # ─────────────────────────────────────────────────────────────────────────────
  backup-staging:
    name: Backup Staging Databases
    needs: [build]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event.inputs.skip_backup != 'true'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Back up PostgreSQL (staging)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.STAGING_POSTGRES_URL }}
        run: node scripts/backup-postgresql.js

      - name: Back up MongoDB (staging)
        working-directory: backend
        env:
          MONGO_URI: ${{ secrets.STAGING_MONGO_URI }}
        run: node scripts/backup-mongodb.js

      - name: Verify backups
        working-directory: backend
        run: |
          PG_BACKUP=$(ls -t backups/postgresql/*.json | head -1)
          MONGO_BACKUP=$(ls -t backups/mongodb/*.json | head -1)
          echo "PostgreSQL backup: $PG_BACKUP"
          echo "MongoDB backup:    $MONGO_BACKUP"
          node scripts/rollback-migration.js --pg-backup "$PG_BACKUP" --dry-run
          echo "Backup verification passed"

      - name: Upload backups as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-backups-${{ github.sha }}
          path: backend/backups/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Deploy to staging + migrate + smoke test
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: [build, backup-staging]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Pull new image on staging host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/agentforge

            # Pull new image
            docker pull ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

            # Apply PostgreSQL migrations before swapping the container
            docker run --rm \
              --network agentforge-net \
              --env DATABASE_URL=$POSTGRES_URL \
              ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }} \
              node -e "
                import('./src/db.js').then(async ({ default: db }) => {
                  await db.healthCheck();
                  console.log('[migrate] PostgreSQL reachable — schema is managed via init scripts');
                  process.exit(0);
                }).catch(err => { console.error(err); process.exit(1); });
              "

            # Rolling restart — Docker Compose updates one container at a time
            docker compose pull backend
            docker compose up -d --no-deps --wait backend

      - name: Validate migration
        run: |
          sleep 10
          STATUS=$(curl -sf ${{ vars.STAGING_URL }}/api/health || echo "FAIL")
          MONGO=$(curl -sf ${{ vars.STAGING_URL }}/api/health/mongo || echo "FAIL")
          echo "PostgreSQL health: $STATUS"
          echo "MongoDB health:    $MONGO"
          if echo "$STATUS" | grep -q '"ok":true' && echo "$MONGO" | grep -q '"ok":true'; then
            echo "Migration validation passed"
          else
            echo "Health check failed after deploy"
            exit 1
          fi

      - name: Run smoke tests
        run: |
          BASE=${{ vars.STAGING_URL }}

          # Agent list
          curl -sf "$BASE/api/agents" > /dev/null && echo "GET /api/agents OK"

          # Tool catalog
          curl -sf "$BASE/api/tools" > /dev/null && echo "GET /api/tools OK"

          # Metrics endpoint
          curl -sf "$BASE/api/metrics" > /dev/null && echo "GET /api/metrics OK"

          # Write smoke test — create and immediately delete an agent
          AGENT=$(curl -sf -X POST "$BASE/api/agents" \
            -H "Content-Type: application/json" \
            -d '{"name":"__smoke_test__","persona":"","systemPrompt":"","tools":[]}')
          AGENT_ID=$(echo "$AGENT" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          curl -sf -X DELETE "$BASE/api/agents/$AGENT_ID" > /dev/null && echo "DELETE /api/agents/$AGENT_ID OK"

          echo "All smoke tests passed"

      - name: Post deployment summary
        if: always()
        run: |
          echo "### Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ vars.STAGING_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Promote to production (manual gate on version tags only)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Back up production databases
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.PROD_POSTGRES_URL }}
          MONGO_URI: ${{ secrets.PROD_MONGO_URI }}
        run: |
          node scripts/backup-postgresql.js
          node scripts/backup-mongodb.js
          # Tag as pre-release so they are never auto-pruned
          TAG=${{ github.ref_name }}
          for f in backups/postgresql/*.json; do
            mv "$f" "${f%.json}-pre-${TAG}.json"
          done
          for f in backups/mongodb/*.json; do
            mv "$f" "${f%.json}-pre-${TAG}.json"
          done

      - name: Upload production pre-release backups
        uses: actions/upload-artifact@v4
        with:
          name: production-backups-${{ github.ref_name }}
          path: backend/backups/
          retention-days: 90

      - name: Verify backup integrity
        working-directory: backend
        run: |
          PG_BACKUP=$(ls -t backups/postgresql/*.json | head -1)
          node scripts/rollback-migration.js --pg-backup "$PG_BACKUP" --dry-run
          echo "Production backup verified"

      - name: Deploy to production (blue-green swap)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/agentforge

            IMAGE="${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"

            # Pull image on production host
            docker pull "$IMAGE"

            # Update compose override to pin the exact image digest
            sed -i "s|image: .*agentforge-backend.*|image: $IMAGE|g" docker-compose.override.yml

            # Zero-downtime rolling restart
            docker compose up -d --no-deps --wait backend

            # Post-deploy health check
            sleep 15
            curl -sf http://localhost:4000/api/health
            curl -sf http://localhost:4000/api/health/mongo

      - name: Post-deployment validation
        run: |
          BASE=${{ vars.PRODUCTION_URL }}
          curl -sf "$BASE/api/health"      | grep '"ok":true'
          curl -sf "$BASE/api/health/mongo" | grep '"ok":true'
          curl -sf "$BASE/api/agents"      > /dev/null
          echo "Production health checks passed"

      - name: Post deployment summary
        if: always()
        run: |
          echo "### Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ needs.build.outputs.image_digest }}\`" >> $GITHUB_STEP_SUMMARY
